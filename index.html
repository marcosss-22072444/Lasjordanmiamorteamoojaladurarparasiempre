<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Las Jordan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --crimson: #8b0000; --rose: #c0392b; --gold: #d4a373; }

    html, body {
      min-height: 100vh;
      background: #0a0000;
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 30%, rgba(139,0,0,0.55) 0%, transparent 65%),
        radial-gradient(ellipse 60% 80% at 20% 80%, rgba(100,0,0,0.4) 0%, transparent 60%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #1a0003 0%, #0a0000 100%);
      z-index: 0;
      animation: breathe 8s ease-in-out infinite alternate;
    }
    @keyframes breathe { 0% { opacity: 0.85; } 100% { opacity: 1; } }

    .petals { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .petal {
      position: absolute; top: -30px;
      background: radial-gradient(ellipse, rgba(192,57,43,0.6), rgba(139,0,0,0.2));
      border-radius: 50% 0 50% 0;
      animation: fall linear infinite; opacity: 0;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(110vh) rotate(360deg) translateX(60px); opacity: 0; }
    }

    #startOverlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(4,0,0,0.98);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(15px);
      transition: opacity 0.8s ease, visibility 0.8s;
    }
    #startOverlay.hidden { opacity: 0; visibility: hidden; }
    .start-box { text-align: center; padding: 20px; }
    .start-rose { font-size: 4rem; display: block; margin-bottom: 20px; animation: floatRose 3s ease-in-out infinite alternate; }
    @keyframes floatRose { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    .start-label { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.2rem; color: rgba(255,200,200,0.7); letter-spacing: 0.1em; margin-bottom: 30px; display: block; }
